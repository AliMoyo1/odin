services:
  gateway-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./workspace:/data/ODIN
      - ./keys:/keys:ro
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - database-node
      - redis-broker

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A workers.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./workspace:/data/ODIN
      - ./backups:/backups
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis-broker
      - database-node

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - redis-broker

  database-node:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - odin_db_data:/var/lib/postgresql/data

  redis-broker:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  odin_db_data:
